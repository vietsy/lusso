<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Lusso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <!-- Favicon -->
    <link rel="icon" href="assets/images/favicon.png" />
    <!-- Open Graph (hiển thị đẹp khi chia sẻ trên Facebook, Zalo, v.v.) -->
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="https://yourdomain.com/" />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main aria-label="Main Content" class="main-content">
      <section class="section1">
        <h1 class="section1__title">
          <img
            class="section1__title--1"
            width="608"
            height="102"
            src="/assets/images/section1-subtitle-1.png"
            alt="Chào mừng quý hành khách bước vào chuyến du hành"
            fetchpriority="high"
          />
          <img
            class="section1__title--2"
            width="401"
            height="438"
            src="/assets/images/section1-title.png"
            alt="THẲNG ĐỨNG"
            fetchpriority="high"
          />
          <img
            class="section1__title--3"
            width="455"
            height="52"
            src="/assets/images/section1-subtitle-2.png"
            alt="để khám phá Lusso Saigon"
            fetchpriority="high"
          />
        </h1>
      </section>
      <section class="section2">
        <img
          alt=""
          class="section2__decor section2__decor--passport"
          aria-hidden="true"
          src="/assets/images/decorate-passport.png"
        />
        <p class="section2__text section2__text--1">
          <picture>
            <source
              srcset="/assets/images/section2-text-sp.png"
              media="(max-width: 768px)"
            />
            <img
              width="706"
              height="226"
              src="/assets/images/section2-text.png"
              alt="Với hộ chiếu mang dấu ‘W’ biểu tượng, quý hành khách đang tiến tới khoang hạng nhất WorldHotels."
              loading="lazy"
            />
          </picture>
        </p>
        <img
          alt=""
          class="section2__decor section2__decor--tau"
          aria-hidden="true"
          src="/assets/images/decorate-tau.png"
        />
        <p class="section2__text section2__text--2">
          <img
            width="622"
            height="253"
            src="/assets/images/section2-text-2.png"
            alt="Với hộ chiếu mang dấu ‘W’ biểu tượng, quý hành khách đang tiến tới khoang hạng nhất WorldHotels."
            loading="lazy"
          />
        </p>
      </section>
      <section class="section3">
        <p class="section3__text">
          <img
            width="492"
            height="483"
            src="/assets/images/section3-text.png"
            alt="Tại tâm điểm mới của TP.HCM, Lusso Saigon là Tòa tháp Branded Residences quản lý vận hành bởi WorldHotels, được phát triển bởi Phát Đạt - Thương hiệu bất động sản hàng đầu Việt Nam."
            loading="lazy"
          />
        </p>
        <div class="section3__decor">
          <img
            alt=""
            aria-hidden="true"
            src="/assets/images/section3-decor-tau.png"
          />
        </div>
      </section>
    </main>
  </body>
</html>
